services:
  nginx:
    image: nginx:1.29-alpine
    container_name: quizatlas-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./backend:/var/www/html
      - ./infrastructure/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - quizatlas-network

  php:
    build:
      context: .
      dockerfile: infrastructure/docker/php/Dockerfile
    container_name: quizatlas-php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - quizatlas-network

  postgres:
    image: postgres:17
    container_name: quizatlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quizatlas-network

  redis:
    image: redis:8-alpine
    container_name: quizatlas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - quizatlas-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: quizatlas-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    networks:
      - quizatlas-network

networks:
  quizatlas-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: