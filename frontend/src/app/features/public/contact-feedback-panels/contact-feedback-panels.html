<section class="split-panels-section">
  <div class="panels-container">
    
    <div class="panel-card feedback-card">
      <div class="panel-text-content">
        <h3>{{ 'landing.panels.feedback_title' | transloco }}</h3>
        <p>{{ 'landing.panels.feedback_desc' | transloco }}</p>
        <button class="feedback-action-btn">
          {{ 'landing.panels.feedback_btn' | transloco }}
        </button>
      </div>
      
      <div class="graphic-wrapper feedback-graphics">
        <div class="speech-bubble">
          <div class="bubble-lines">
            <span class="line"></span>
            <span class="line"></span>
          </div>
        </div>
        <div class="floating-pen"></div>
        <div class="eraser-base"></div>
      </div>
    </div>

    <div class="panel-card contact-card">
      <div class="panel-text-content">
        <h3>{{ 'landing.panels.contact_title' | transloco }}</h3>
        <p>{{ 'landing.panels.contact_desc' | transloco }}</p>
        
        <div class="contact-info-list">
          <div class="info-row">
            <span class="material-icons-outlined">email</span>
            <a href="mailto:contact@qcmaster.com">contact@qcmaster.com</a>
          </div>
          <div class="info-row">
            <span class="material-icons-outlined">phone</span>
            <a href="tel:+212612345678">+212 6 12 34 56 78</a>
          </div>
          <div class="info-row">
            <span class="material-icons-outlined">location_on</span>
            <span>Casablanca, Maroc</span>
          </div>
        </div>
      </div>

      <div class="graphic-wrapper envelope-graphics">
        <div class="envelope-back">
          <div class="letter-sheet">
            <span class="l-line"></span>
            <span class="l-line"></span>
            <span class="l-line"></span>
          </div>
          <div class="envelope-front-wings"></div>
        </div>
        <div class="leaf leaf-1"></div>
        <div class="leaf leaf-2"></div>
        <div class="leaf leaf-3"></div>
        <span class="sparkle sp-1">✦</span>
        <span class="sparkle sp-2">✦</span>
      </div>
    </div>

  </div>
</section>
